 <link rel="stylesheet" href="../css/style.css">

         <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
         <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
  <!-- PWA mets tags -->
        <link rel="manifest" href="../manifest.json">
        <meta name="theme-color" content="#4CAF50">
        <!-- ios support -->
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="CTY Bible">

</head>
<body>

  <!-- Navigation Bar -->
   <!-- Fixed Top Navbar -->
  <nav class="profile-navbar">
    <div class="navbar-left">
      <div class="logo">
        <img id="navbarLogo" src="../assets/images/tr-logo.svg" alt="CTY">
      </div>
    </div>
    <div class="navbar-right">
      <a href="./dashboard.html" class="btn btn-secondary" aria-label="Back to Dashboard">Back</a>
      <a href="./profile.html" class="navbar-avatar-link" aria-label="My Profile">
        <img id="profileAvatar" src="../assets/images/avatar, user, icon, client, account, buttons….jpg" alt="Profile" class="navbar-avatar">
      </a>
    </div>
  </nav>
    


  <section id="edit-profile" class="edit-profile-section">
    <div class="profile-card">
      <header class="profile-header">
        <h1> <img src="../assets/icons/person-cty.svg" alt="#"> Edit Your Profile</h1>
        <p>Update your information and preferences</p>
      </header>

      <form class="profile-form">
        <!-- Profile Avatar Section -->
        <div class="avatar-section">
          <div class="avatar-container">
            <img src="../assets/images/avatar, user, icon, client, account, buttons….jpg" alt="" class="profile-avatar" id="mainProfileAvatar">
            <!-- <div class="avatar-overlay">
              <span class="camera-icon">📷</span>
            </div> -->
          </div>
          <div class="avatar-buttons">
            <button type="button" id="avatarInput" class="change-photo-btn">Change Photo</button>
            <button type="button" id="deleteAvatarBtn" class="delete-photo-btn" style="display: none;">Delete Photo</button>
          </div>
        </div>

        <!-- first commenting -->

        <!-- Form Fields -->
         <!-- <div class="form-fields">

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
          </div> 

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword"  placeholder="Enter new password" minlength="6">
          </div>  -->


          
          <!-- second commenting -->

           <!-- <div class="form-group">
                    <label for="confirmPassword">New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6">
                </div> -->

           <!-- <div class="form-group"> 
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="4" max="17" placeholder="Your age" required>
          </div> -->

          <!-- <div class="form-actions">
           
            <button type="button" id="updatePasswordBtn" class="updatepasswordBtn" disabled>Update Password</button>
          </div> -->
          <!--  3rd commenting -->

          <div class="form-group">
            <label for="theme-preference">Theme Preference</label>
            <div class="theme-toggle-container">
              <label class="theme-option">
                <input type="radio" name="theme" value="light" id="lightModeRadio">
                <span class="theme-label">
                  <span class="theme-icon">☀️</span>
                  Light Mode
                </span>
              </label>
              <label class="theme-option">
                <input type="radio" name="theme" value="dark" id="darkModeRadio">
                <span class="theme-label">
                  <span class="theme-icon">🌙</span>
                  Dark Mode
                </span> 
               </label>
            </div>
          </div>

          <div class="form-group">
            <label>Daily Notifications</label>
            <div style="display:flex;align-items:center;gap:14px;margin-top:8px;">
              <label style="position:relative;display:inline-block;width:52px;height:28px;flex-shrink:0;">
                <input type="checkbox" id="notifToggle" style="opacity:0;width:0;height:0;">
                <span id="notifSlider" style="
                  position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
                  background:#ccc;border-radius:28px;transition:.3s;
                "></span>
              </label>
              <span id="notifStatus" style="font-size:0.9rem;color:var(--color-text,#333);">Loading…</span>
            </div>
            <small style="display:block;margin-top:6px;opacity:0.7;">Receive your daily verse reminder at 7 AM</small>
          </div>

          <div class="profile-logout-row">
            <button type="button" class="logout-text-btn" onclick="confirmLogout()">Sign out</button>
          </div>
        </div>
      </form>
    </div>
  </section>

  <!-- Shop History Section -->
  <section id="shop-history-section" class="shop-history-section" style="display:none;">
    <div class="profile-card shop-history-card">
      <header class="profile-header">
        <h1><span class="shop-history-icon">🛒</span> Shop History</h1>
        <p>Your merchandise orders from the CTY Shop</p>
      </header>
      <div id="shop-history-list" class="shop-history-list">
        <p class="shop-history-empty">No orders yet. <a href="../shop/shop.html">Visit the shop!</a></p>
      </div>
    </div>
  </section>

  <!-- 6th commenting -->
   
   <!-- <h1>COMING SOON</h1> -->

  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="logout-modal-overlay" hidden>
    <div class="logout-modal-card">
      <p class="logout-modal-msg">Are you sure you want to sign out?</p>
      <div class="logout-modal-actions">
        <button type="button" class="logout-modal-cancel" onclick="document.getElementById('logoutModal').hidden=true">Cancel</button>
        <button type="button" class="logout-modal-confirm" onclick="logout()">Sign out</button>
      </div>
    </div>
  </div>

   <!-- scripts -->
   <!-- Cropper.js Library -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
   
   <!-- Firebase SDK v8 -->
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
   
   <!-- Firebase Configuration -->
   <script src="../js/firebase-config.js"></script>

   <!-- Auth (provides logout function) -->
   <script src="../authentication/auth-v2.js"></script>

   <!-- Profile Script -->
   <script src="./profile.js"></script>
   
   <!-- Dark Mode Script -->
   <script src="../js/dark-mode.js"></script>

   <!-- PWA / Service Worker registration (must load before push-notifications.js) -->
   <script src="../js/pwa-install.js"></script>

   <!-- Push Notifications (provides window.PushNotifications API) -->
   <script src="../js/push-notifications.js"></script>

   <script>
     function confirmLogout() {
       document.getElementById('logoutModal').hidden = false;
     }
   </script>

</body>
</html>
